<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header>
       <nav class="navbar">
            <div class="navdiv">
                <a href="#menu">
                    <span class="material-symbols-outlined menu-symbol">menu</span>
                </a>
                <div class="title"><a href="contact.html">Contact Us</a></div>
                <div class="symbols">
                <a href="#search">
                    <span class="material-symbols-outlined search-symbol">search</span>
                </a>
                <a href="#cart">
                    <span class="material-symbols-outlined cart-symbol">shopping_cart_checkout</span>
                </a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="contact-us">
        <form class="form"  action="https://httpbin.org/get" method="get">
            <fieldset>
                <legend>Send Us A Message</legend>
                <p class="details">
                    <label class="label" for="Name">Name:</label>
                    <input class="input" type="text" name="Name" id="Name" placeholder="your name" autocomplete="off" required />
                </p>
                <p class="details">
                    <label class="label" for="phone">Phone:</label>
                    <input class="input" type="tel" name="phone" id="phone" placeholder="your phone number" autocomplete="off" required />
                </p>
                <p class="details">
                    <label class="label" for="Email">Email:</label>
                    <input class="input" type="Email" name="Email" id="Email" placeholder="your email" autocomplete="off" required />
                </p>
                <p class="details">
                    <label class="label" for="message">Message:</label>
                    <textarea class="input" name="message" id="message" cols="20" rows="7"
                        placeholder="Type your message here"></textarea>
                </p>
            </fieldset>
            <section class="result">
            <button class="btn-primary" type="submit">Submit</button>
            <button class=" btn-primary btn-secondary" type="reset">Reset</button>
            </section>
        </form>
        </section>
    </main>
    <footer>
        
            <address>
                  📍 Road No. 36, Jubilee Hills, Hyderabad, Telangana <br>500033
            </address>
            <p>📞 <a href="tel:+917065213685">+91 7065213685</a></p>
            <p>✉️ contact@tacofiesta.com </p>
            <p>⏱️ Mon - Sun: 11:00 AM - 11:00 PM</p>
        <p>&copy; 2026 Taco Fiesta</p>
    </footer>
</body>

</html>
